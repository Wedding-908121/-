name: Collect and publish mechanical intelligence

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      resummarize:
        description: "重新生成采集窗口内已有资料的 AI 摘要"
        required: false
        type: boolean
        default: false
  schedule:
    # 每周一 08:30（北京时间）= UTC 00:30 Monday
    - cron: "30 0 * * 1"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: mech-intel-pages
  cancel-in-progress: false

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Collect and summarize
        run: node scripts/quick_collect.mjs
        env:
          AI_PROVIDER: deepseek
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL || 'deepseek-chat' }}
          DEEPSEEK_BASE_URL: ${{ vars.DEEPSEEK_BASE_URL || 'https://api.deepseek.com' }}
          AI_RESUMMARIZE_EXISTING: ${{ inputs.resummarize || 'false' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o-mini' }}

      - name: Commit refreshed intelligence
        continue-on-error: true
        run: |
          if git diff --quiet -- public/data/articles.json; then
            echo "No intelligence changes."
            exit 0
          fi
          git config user.name "mech-intel-bot"
          git config user.email "mech-intel-bot@users.noreply.github.com"
          git add public/data/articles.json
          git commit -m "data: refresh weekly mechanical intelligence"
          git push

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build
        run: npm run build
        env:
          PUBLIC_BASE_URL: https://Wedding-908121.github.io/-

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
